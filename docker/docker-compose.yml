services:
  mysql:
    image: mysql:8.0
    container_name: board-mysql
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: board_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../SQL:/docker-entrypoint-initdb.d
    networks:
      - board-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: board-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: user
      DB_PASSWORD: password
      SERVER_SERVLET_ENCODING_CHARSET: UTF-8
      SERVER_SERVLET_ENCODING_FORCE: "true"
      SERVER_SERVLET_ENCODING_ENABLED: "true"
      UPLOAD_PATH: /app/upload
    volumes:
      - /mnt/nas/docker-data/upload:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - board-network

networks:
  board-network:
    driver: bridge

volumes:
  mysql_data:

services:
  mysql:
    image: mysql:8.0
    container_name: board-mysql
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: board_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../SQL:/docker-entrypoint-initdb.d
    networks:
      - board-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: board-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/board_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    volumes:
      - /mnt/nas/docker-data/upload:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - board-network
  app:
    environment:
      - UPLOAD_PATH=/app/uploads
    volumes:
      - /mnt/nas/docker-data/upload

networks:
  board-network:
    driver: bridge

volumes:
  mysql_data:
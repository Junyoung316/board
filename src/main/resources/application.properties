spring.application.name=board

# data source - MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/board_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8
spring.datasource.username=user
spring.datasource.password=password

# MyBatis setting
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.jun.board.domain
mybatis.mapper-locations=classpath:mybatis/mapper/**/**.xml

# log level
#logging.level.root=DEBUG
#logging.level.com.jun.board=DEBUG

# file upload setting
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
# upload file path
spring.servlet.multipart.location=/Users/junyoung/Developer/board/board/upload
upload.path=/Users/junyoung/Developer/board/board/upload